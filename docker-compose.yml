services:
  id-editor-server:
    build:
      context: ./id-editor-server
      dockerfile: Dockerfile
    container_name: id-editor-server
    env_file:
      - ./id-editor-server/.env
    ports:
      - "3000:3000"
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      id-editor-tool:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health || wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - app-network

  id-editor-tool:
    build:
      context: ./id-editor-tool
      dockerfile: Dockerfile
    container_name: id-editor-tool
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
